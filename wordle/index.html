<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wordle</title>
  <link rel="stylesheet" href="styles.css">
  <!-- type="module" defers execution automatically -->
  <script type="module" src="dist/bundle.js"></script>
</head>
<body>
  <div class="app">

    <header class="header">
      <h1 class="header__title">Wordle</h1>
    </header>

    <!-- Toast notifications; aria-live announces them to screen readers -->
    <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>

    <main class="main">
      <div id="board" class="board" role="grid" aria-label="Wordle game board"></div>
    </main>

    <footer class="footer">
      <div id="keyboard" class="keyboard" role="group" aria-label="On-screen keyboard"></div>
    </footer>

  </div>
</body>
</html>
