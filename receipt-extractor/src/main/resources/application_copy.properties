# ============================================================
#  Cash Deposit Receipt Extractor — Configuration
#  Copy this file next to the JAR and edit before running.
# ============================================================

# ── OCR Engine ──────────────────────────────────────────────
# Options: claude (default) | google-vision | tesseract
ocr.engine=claude

# Claude Vision API (required when ocr.engine=claude)
# Get your key at: https://console.anthropic.com
# You can also set the env var ANTHROPIC_API_KEY instead.
ocr.claude.api-key=YOUR_ANTHROPIC_API_KEY_HERE
ocr.claude.model=claude-opus-4-6
ocr.claude.max-tokens=2048
ocr.claude.max-image-mb=10

# ── Gmail Authentication ─────────────────────────────────────
# Option A — Service account with domain-wide delegation (recommended for Google Workspace).
#   1. Create a service account in Google Cloud Console and download its JSON key.
#   2. Enable domain-wide delegation on the service account.
#   3. In Google Workspace Admin > Security > API Controls > Domain-wide Delegation,
#      add the service account Client ID with scopes:
#        https://www.googleapis.com/auth/gmail.readonly
#        https://www.googleapis.com/auth/gmail.modify
#   4. Set the paths below and leave gmail.credentials.path blank.
gmail.service-account.key-path=some-service-account.json
gmail.impersonate-user=hello@abc.com

# Option B — Browser OAuth (fallback, used when service-account.key-path is blank or missing).
#   Download credentials.json from Google Cloud Console > APIs & Services > Credentials.
#   See SETUP_GUIDE.md for step-by-step instructions.
#gmail.credentials.path=credentials.json
gmail.credentials.path=

# Where to cache the OAuth token after the first login (Option B only).
gmail.tokens.path=tokens

# Local port for the OAuth browser redirect (Option B only).
gmail.oauth.port=8888

# ── Email Processing ─────────────────────────────────────────
# Only process emails addressed to this recipient (leave blank to process all unread emails).
email.recipient-filter=abc@xyz.com, abc2@other.com

# ── Email Processing ─────────────────────────────────────────
# How many of the latest unread emails to check per run.
email.max-fetch=10

# Mark emails as read after successful extraction so they are not re-processed.
email.mark-as-read=true

# ── Output ───────────────────────────────────────────────────
# Path to the output CSV file (relative to the working directory, or absolute).
output.csv.path=deposits.csv

# true  = append new rows each run (recommended — preserves history)
# false = overwrite the file each run
output.csv.append=true
